<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Share Mobile Plus</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>画面共有ルーム</h1>
            <div id="status" class="status-bar">準備中...</div>
        </header>

        <main>
            <div id="setup-area" class="card">
                <div class="input-group">
                    <label>ルームワード</label>
                    <input type="text" id="word" placeholder="例: room1">
                </div>
                <div class="input-group">
                    <label>PIN (数字)</label>
                    <input type="number" id="pin" placeholder="例: 1234">
                </div>
                <div class="button-group">
                    <button id="btn-create" class="btn primary">部屋を作る (配信開始)</button>
                    <button id="btn-join" class="btn secondary">入室する (視聴する)</button>
                </div>
            </div>

            <div id="video-area" class="card hidden">
                <video id="remote-video" autoplay playsinline controls></video>
                <button onclick="location.reload()" class="btn danger">終了して戻る</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
